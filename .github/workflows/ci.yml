name: Node.js CI

# Se ejecuta cuando se hace push o pull request a la rama main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: ./67001310_STE  # Carpeta donde está tu proyecto

    steps:
      # Paso 1: Descargar el código del repositorio
      - name: Checkout code
        uses: actions/checkout@v2

      # Paso 2: Configurar Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'  # Versión más actual y estable

      # Paso 3: Instalar dependencias (Express)
      - name: Install dependencies
        run: npm install

      # Paso 4: Verificar que el servidor arranca sin errores
      - name: Check server starts
        run: node -e "require('./server.js')" --timeout 5000
        continue-on-error: true  # No falla el CI si el servidor no para solo
